<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>Document</title>
        </head>
    <body>
        <h2>Functional calculatore </h2>
        <input type="number" id="num1" placeholder="enter first num"/><br><br>
        <input type="number" id="num2" placeholder="enter second num"/><br><br>
        <select id="operation">
            <option value="addition">addition(+)</option>
            <option value="subtraction">subtraction</option>
            <option value="multiplication">multiplication</option>
            <option value="Division">Division</option>
        </select>
        <button onclick="calculate()">calculate</button>
        <div id="result">result :</div>
        <script>
            function calculate(){
              let num1=parseInt(document.getElementById("num1").value);
              let num2=parseInt(document.getElementById("num2").value);
              let operation=document.getElementById("operation").value;
              let result;

              if(isNaN(num1)||isNaN(num2)){
                result="enter a valid num"
              }
              else{
                switch(operation){
                    case "addition":
                        result=num1+num2;
                        break;
                    case "subtraction" :
                        result=num1-num2;
                        break; 
                     case "multiplication" :
                        result=num1*num2;
                        break;    
                     case "Division" :
                        if(num2 !==0){
                        result=num1/num2;
                        }else{
                            result = "please enter non-zero second number";
                        }
                        break;    
                    default:
                        result="invalid operation"
                }
              }
            document.getElementById("result").innerText="result:"+result
            }
        </script>
    </body>
    </html>
